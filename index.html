<!DOCTYPE html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/jquery.terminal/css/jquery.terminal.min.css"
    />

    <style>
      :root {
        --size: 1.3;
      }

      .command,
      .directory {
        cursor: pointer;
      }

      .terminal {
        background-color: #1d2936;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.terminal/js/jquery.terminal.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/figlet@1.8.1/lib/figlet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/isomorphic-lolcat"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.terminal/js/xml_formatting.js"></script>
    <script src="my-terminal.js" type="module"></script>
  </body>
</html>
